name: Build Layuh to .exe

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check project structure
      run: |
        echo "=== Checking solution file ==="
        dir "totally not layuh.sln"
        echo ""
        echo "=== Checking layuh project ==="
        dir layuh/
        echo ""
        echo "=== Checking packages ==="
        dir packages/

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      run: nuget restore "totally not layuh.sln"

    - name: Build Release x64
      run: |
        msbuild "totally not layuh.sln" /p:Configuration=Release /p:Platform=x64 /verbosity:diagnostic /m:1
        
    - name: Find EXE files
      run: |
        echo "Searching for EXE files..."
        Get-ChildItem -Path "layuh" -Include "*.exe" -Recurse | ForEach-Object { echo $_.FullName }
        echo ""
        echo "Full directory tree:"
        Get-ChildItem -Path "layuh" -Recurse | Select-Object Name, FullName | Format-List
        
    - name: Upload x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: layuh-x64-exe
        path: layuh/**/Release/*.exe
        if-no-files-found: error

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: layuh/**/Release/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
